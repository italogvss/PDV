# =============================================================
# PDV-Ultra - Stack de DESENVOLVIMENTO
# Backend com hot reload (dotnet watch) + Vite dev server (HMR),
# ambos depuraveis pelo VS Code (ver .vscode/launch.json).
# Subir: docker compose up
# =============================================================
services:
  # -- Banco de dados MySQL -----------------------------------
  db:
    image: mysql:8
    container_name: pdv-db
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
    ports:
      - "3307:3306"            # host 3307 -> container 3306
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # -- Storage de objetos MinIO (S3-compativel) ---------------
  # API S3 na 9000, console web na 9001. O backend (container) acessa via
  # minio:9000; o navegador (host) acessa as presigned URLs via localhost:9000.
  minio:
    image: minio/minio:latest
    container_name: pdv-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      # Libera o preflight CORS do navegador (PUT/GET direto do frontend no MinIO).
      MINIO_API_CORS_ALLOW_ORIGIN: ${FRONTEND_URL}
    ports:
      - "9000:9000"            # API S3 (presigned URLs apontam para localhost:9000)
      - "9001:9001"            # Console web (http://localhost:9001)
    volumes:
      - minio_data:/data
    restart: unless-stopped

  # -- API .NET (estagio dev: SDK + dotnet watch + vsdbg) -----
  api:
    build:
      context: ./backend
      dockerfile: PDV.Api/Dockerfile
      target: dev
    container_name: pdv-api
    command: dotnet watch run --project PDV.Api --no-launch-profile --urls http://0.0.0.0:8080
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      # Bind mount Windows->Linux nao emite eventos de fs - polling e obrigatorio.
      DOTNET_USE_POLLING_FILE_WATCHER: "true"
    env_file:
      - .env
    ports:
      - "5000:8080"            # host 5000 -> container 8080
    volumes:
      - ./backend:/src         # codigo-fonte para hot reload
      # Volumes anonimos mascaram bin/obj do host Windows (evita conflito
      # com os artefatos compilados dentro do container Linux).
      - /src/PDV.Api/bin
      - /src/PDV.Api/obj
      - /src/PDV.Application/bin
      - /src/PDV.Application/obj
      - /src/PDV.Domain/bin
      - /src/PDV.Domain/obj
      - /src/PDV.Infrastructure/bin
      - /src/PDV.Infrastructure/obj
    depends_on:
      db:
        condition: service_healthy
      minio:
        condition: service_started
    restart: unless-stopped

  # -- Frontend React (estagio dev: Vite dev server com HMR) --
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: dev
    container_name: pdv-frontend
    # npm install sincroniza pacotes novos do host no volume anonimo antes de subir o Vite.
    # Para adicionar pacotes: npm install <pkg> no host + docker compose restart frontend.
    command: sh -c "npm install --prefer-offline && npm run dev -- --host 0.0.0.0"
    # Apenas variaveis VITE_* - secrets do backend nao entram aqui.
    environment:
      VITE_API_URL: ${VITE_API_URL}
      VITE_GOOGLE_CLIENT_ID: ${VITE_GOOGLE_CLIENT_ID}
      VITE_BYPASS_AUTH: ${VITE_BYPASS_AUTH}
    ports:
      - "5173:5173"            # porta do Vite dev server
    volumes:
      - ./frontend:/app        # codigo-fonte para HMR
      - /app/node_modules      # usa o node_modules da imagem
    depends_on:
      - api
    restart: unless-stopped

volumes:
  mysql_data:
  minio_data:
