# =============================================================
# PDV-Ultra - Stack de PRODUCAO
# nginx (reverse proxy) -> frontend (build estatico) + api (.NET).
# Subir: docker compose -f docker-compose.prod.yml --env-file .env.prod up -d --build
# =============================================================
services:
  # -- Reverse proxy ------------------------------------------
  nginx:
    image: nginx:alpine
    container_name: pdv-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx.prod.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api
      - frontend
    restart: unless-stopped

  # -- API .NET (estagio final de producao) -------------------
  api:
    build:
      context: ./backend
      dockerfile: PDV.Api/Dockerfile
      target: final
    container_name: pdv-api
    environment:
      ASPNETCORE_ENVIRONMENT: Production
    env_file:
      - .env.prod
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  # -- Frontend (build estatico servido por nginx) ------------
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: final
      args:
        # Embutido no bundle no momento do build.
        VITE_API_URL: ${VITE_API_URL}
        VITE_GOOGLE_CLIENT_ID: ${VITE_GOOGLE_CLIENT_ID}
    container_name: pdv-frontend
    restart: unless-stopped

  # -- Banco de dados MySQL -----------------------------------
  db:
    image: mysql:8
    container_name: pdv-db
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  mysql_data:
